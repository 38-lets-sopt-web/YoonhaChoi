<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/theme.css" />
    <title>윤하의 블로그</title>
  </head>

  <body>
    <header>
      <img src="./images/5216_6301_1640.jpg" class="profile" />
      <div class="title">
        <h1>윤하의 블로그</h1>
        <p>윤하집에 웹왔니</p>
      </div>
      <a
        href="https://github.com/twossu"
        target="_blank"
        rel="noopener noreferrer"
        class="github"
      >
        <img src="./images/github-logo.png" />
      </a>
    </header>

    <main>
      <nav class="sidebar">
        <ul>
          <li><a href="#section-photo">포토덤프</a></li>
          <li><a href="#section-favorite">사진첩</a></li>
          <li><a href="#section-interest">내 관심사</a></li>
          <li><a href="#section-message">웹왔니 친구들에게</a></li>
        </ul>
      </nav>

      <div class="content">
        <section id="section-photo">
          <h2>📸 포토덤프</h2>
          <ul class="photo-dump">
            <li class="photo-box">
              <img src="./images/family.jpeg" alt="클러스타 가족들" />
            </li>
            <li class="photo-box">
              <img src="./images/jeju.jpeg" alt="jeju" />
            </li>
            <li class="photo-box">
              <img src="./images/ddugi.jpeg" alt="강아지 뱃살" />
            </li>
            <li class="photo-box">
              <img src="./images/otter.jpeg" alt="수달" />
            </li>
            <li class="photo-box">
              <img src="./images/fishing.jpeg" alt="새벽낚시" />
            </li>
            <li class="photo-box">
              <img src="./images/snow.jpeg" alt="책눈사람" />
            </li>
          </ul>
        </section>

        <section id="section-favorite">
          <h2>좋아하는 것</h2>
          <div class="slider-container">
            <div class="scroll-container">
              <div class="slide-group">
                <img src="./images/tanghulu.jpeg" alt="탕후루" />
                <img src="./images/baseball.jpeg" alt="야구장 음식" />
                <img src="./images/festival.jpeg" alt="지역축제 음식" />
                <img src="./images/cake.jpeg" alt="지옥에서 온 케이크" />
                <img src="./images/samgyeopsal.jpeg" alt="삼겹살" />
                <img src="./images/food-party.jpeg" alt="음식파티" />
              </div>

              <div class="slide-group">
                <img src="./images/tanghulu.jpeg" alt="탕후루" />
                <img src="./images/baseball.jpeg" alt="야구장 음식" />
                <img src="./images/festival.jpeg" alt="지역축제 음식" />
                <img src="./images/cake.jpeg" alt="지옥에서 온 케이크" />
                <img src="./images/samgyeopsal.jpeg" alt="삼겹살" />
                <img src="./images/food-party.jpeg" alt="음식파티" />
              </div>
            </div>
          </div>
        </section>

        <section id="section-interest">
          <h2>😍 내 관심사</h2>
          <ul class="card-list">
            <li class="card">
              <img src="./images/ddugi.jpeg" />
              <div class="card-body">
                <p>뚜기</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/ocean.jpeg" />
              <div class="card-body">
                <p>즉흥바다</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/sleep.jpeg" />
              <div class="card-body">
                <p>눕기</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/dak-galbi.jpeg" />
              <div class="card-body">
                <p>닭갈비</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/barge.jpeg" />
              <div class="card-body">
                <p>단체놀이</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/chicken.jpeg" />
              <div class="card-body">
                <p>길치킨</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/bab.jpeg" />
              <div class="card-body">
                <p>볶음밥</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>

            <li class="card">
              <img src="./images/hot-pot.jpeg" />
              <div class="card-body">
                <p>맛나음식</p>
                <div class="button-container">
                  <button class="button-good">좋아요</button>
                  <button class="button-bad">싫어요</button>
                </div>
              </div>
            </li>
          </ul>
        </section>

        <section id="section-message">
          <h2>To. 우리집에 웹왔니</h2>
          <div class="to-web-box">
            <p>방가방가</p>
            <p>황금잔디조를 향해서~!</p>
          </div>
        </section>
      </div>
    </main>

    <footer>좋은 하루 ☀️</footer>
  </body>
</html>
